<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumenate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }

    .card {
      background: #f5f5f4;
      border-radius: 16px;
      padding: 52px 56px 44px 56px;
      max-width: 680px;
      width: 100%;
      position: relative;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .logo {
      position: absolute;
      top: 40px;
      right: 48px;
      width: 38px;
      height: 38px;
    }

    /* Simple lumenate logo — circle with a ray */
    .logo svg {
      width: 38px;
      height: 38px;
    }

    .greeting {
      font-size: 15px;
      color: #1a1a2e;
      margin-bottom: 28px;
      letter-spacing: 0.01em;
    }

    .block {
      margin-bottom: 24px;
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a2e;
    }

    .block strong {
      font-weight: 700;
    }

    .tagline {
      margin-top: 28px;
      margin-bottom: 8px;
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a2e;
    }

    .mission {
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a2e;
      margin-bottom: 40px;
    }

    .contact {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="card">


<p class="greeting">Hello,</p>

    <p class="block">
      <strong>Lumenate Medical</strong> is developing a novel AI-assisted bladder imaging system
      that augments urology practices' ability for cystoscopy. The easy-to-use
      platform aims to expand access to screening and improve urological outcomes.

    </p>

    <p class="contact">contact us — hello@lumenatemedical.com</p>

  </div>
</body>
</html>
